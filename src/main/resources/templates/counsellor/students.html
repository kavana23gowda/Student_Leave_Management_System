<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h5 class="fw-bold mb-3">👨‍🎓 My Students</h5>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>USN</th>
                    <th>Department</th>
                    <th>Academic Year</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        No students assigned yet.
                    </td>
                </tr>
                <tr th:each="s, i : ${students}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.usn}"></td>
                    <td th:text="${s.department}"></td>
                    <td th:text="${s.academicYear}"></td>
                    <td>
                <span th:text="${s.active ? 'Active' : 'Inactive'}"
                      th:class="${s.active} ?
                                 'badge bg-success' :
                                 'badge bg-secondary'">
                </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/counsellor/dashboard}"
       class="btn btn-outline-primary mt-3">← Back</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
