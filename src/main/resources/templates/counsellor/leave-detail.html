<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white fw-bold">
                    🔍 Review Leave Request
                </div>
                <div class="card-body">

                    <table class="table table-bordered mb-4">
                        <tr>
                            <th width="35%">Student Name</th>
                            <td th:text="${leave.student.name}"></td>
                        </tr>
                        <tr>
                            <th>USN</th>
                            <td th:text="${leave.student.usn}"></td>
                        </tr>
                        <tr>
                            <th>Leave Type</th>
                            <td th:text="${leave.leaveType.name}"></td>
                        </tr>
                        <tr>
                            <th>From Date</th>
                            <td th:text="${leave.fromDate}"></td>
                        </tr>
                        <tr>
                            <th>To Date</th>
                            <td th:text="${leave.toDate}"></td>
                        </tr>
                        <tr>
                            <th>Total Days</th>
                            <td th:text="${leave.numberOfDays}"></td>
                        </tr>
                        <tr>
                            <th>Reason</th>
                            <td th:text="${leave.reason}"></td>
                        </tr>
                        <tr>
                            <th>Applied On</th>
                            <td th:text="${#temporals.format(
                                leave.appliedOn,'dd-MM-yyyy HH:mm')}">
                            </td>
                        </tr>
                        <tr>
                            <th>Status</th>
                            <td>
                  <span th:text="${leave.status}"
                        th:class="${leave.status.name() == 'APPROVED'} ?
                                   'badge bg-success' :
                                   (${leave.status.name() == 'REJECTED'} ?
                                    'badge bg-danger' :
                                    'badge bg-warning text-dark')">
                  </span>
                            </td>
                        </tr>
                        <tr th:if="${leave.remarks != null}">
                            <th>Remarks</th>
                            <td th:text="${leave.remarks}"></td>
                        </tr>
                    </table>

                    <!-- Approve / Reject only if PENDING -->
                    <div th:if="${leave.status.name() == 'PENDING'}">

                        <div class="row g-3">
                            <!-- Approve -->
                            <div class="col-md-6">
                                <div class="card border-success">
                                    <div class="card-body">
                                        <h6 class="text-success fw-bold">✅ Approve Leave</h6>
                                        <form th:action="@{/counsellor/leave/{id}/approve
                                        (id=${leave.id})}"
                                              method="post">
                                            <div class="mb-2">
                                                <input type="text" name="remarks"
                                                       class="form-control form-control-sm"
                                                       placeholder="Remarks (optional)">
                                            </div>
                                            <button type="submit"
                                                    class="btn btn-success btn-sm w-100">
                                                Approve
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- Reject -->
                            <div class="col-md-6">
                                <div class="card border-danger">
                                    <div class="card-body">
                                        <h6 class="text-danger fw-bold">❌ Reject Leave</h6>
                                        <form th:action="@{/counsellor/leave/{id}/reject
                                        (id=${leave.id})}"
                                              method="post">
                                            <div class="mb-2">
                                                <input type="text" name="remarks"
                                                       class="form-control form-control-sm"
                                                       placeholder="Reason (required)"
                                                       required>
                                            </div>
                                            <button type="submit"
                                                    class="btn btn-danger btn-sm w-100">
                                                Reject
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <a th:href="@{/counsellor/dashboard}"
                       class="btn btn-outline-secondary mt-3">← Back</a>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
