<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h5 class="fw-bold mb-3">🔔 Notifications</h5>

    <div class="card shadow">
        <div class="card-body p-0">
            <ul class="list-group list-group-flush">
                <li th:if="${#lists.isEmpty(notifications)}"
                    class="list-group-item text-center text-muted py-4">
                    No notifications yet.
                </li>
                <li th:each="n : ${notifications}"
                    class="list-group-item d-flex
                     justify-content-between align-items-start py-3">
                    <div>
                        <p class="mb-1" th:text="${n.message}"></p>
                        <small class="text-muted"
                               th:text="${#temporals.format(
                                 n.createdAt,'dd-MM-yyyy HH:mm')}">
                        </small>
                    </div>
                    <span th:if="${!n.read}"
                          class="badge bg-primary ms-2">New</span>
                </li>
            </ul>
        </div>
    </div>

    <a th:href="@{/counsellor/dashboard}"
       class="btn btn-outline-primary mt-3">← Back</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
