<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Apply Leave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-header bg-primary text-white fw-bold">
          📝 Apply for Leave
        </div>
        <div class="card-body">

          <form th:action="@{/student/apply}"
                th:object="${leaveRequest}" method="post">

            <div class="mb-3">
              <label class="form-label fw-semibold">Leave Type</label>
              <select th:field="*{leaveType.id}"
                      class="form-select" required>
                <option value="">-- Select Leave Type --</option>
                <option th:each="type : ${leaveTypes}"
                        th:value="${type.id}"
                        th:text="${type.name} +
                                    ' (Max: ' + ${type.maxDays} +
                                    ' days)'">
                </option>
              </select>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">From Date</label>
                <input type="date" th:field="*{fromDate}"
                       class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">To Date</label>
                <input type="date" th:field="*{toDate}"
                       class="form-control" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Reason</label>
              <textarea th:field="*{reason}"
                        class="form-control" rows="4"
                        placeholder="Explain your reason clearly..."
                        required></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary px-4">
                Submit Application
              </button>
              <a th:href="@{/student/dashboard}"
                 class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
