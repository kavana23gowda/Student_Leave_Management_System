<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <!-- Welcome -->
    <h4 class="fw-bold">Welcome, <span th:text="${student.name}"></span> 👋</h4>
    <p class="text-muted">Here's your leave summary</p>

    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-warning shadow">
                <div class="card-body text-center">
                    <h2 th:text="${pendingCount}">0</h2>
                    <p class="mb-0">Pending Leaves</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body text-center">
                    <h2 th:text="${approvedCount}">0</h2>
                    <p class="mb-0">Approved Leaves</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger shadow">
                <div class="card-body text-center">
                    <h2 th:text="${rejectedCount}">0</h2>
                    <p class="mb-0">Rejected Leaves</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Apply Button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">My Leave Requests</h5>
        <a th:href="@{/student/apply}"
           class="btn btn-primary btn-sm">+ Apply for Leave</a>
    </div>

    <!-- Leave Table -->
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Leave Type</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Days</th>
                    <th>Status</th>
                    <th>Applied On</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(leaves)}">
                    <td colspan="8" class="text-center text-muted py-3">
                        No leave requests yet.
                    </td>
                </tr>
                <tr th:each="leave, i : ${leaves}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${leave.leaveType.name}"></td>
                    <td th:text="${leave.fromDate}"></td>
                    <td th:text="${leave.toDate}"></td>
                    <td th:text="${leave.numberOfDays}"></td>
                    <td>
                <span th:text="${leave.status}"
                      th:classappend="${leave.status.name() == 'APPROVED'} ? 'badge bg-success' :
                                      (${leave.status.name() == 'REJECTED'} ? 'badge bg-danger' :
                                       'badge bg-warning text-dark')">
                </span>
                    </td>
                    <td th:text="${#temporals.format(leave.appliedOn, 'dd-MM-yyyy')}"></td>
                    <td>
                        <a th:href="@{/student/leave/{id}(id=${leave.id})}"
                           class="btn btn-sm btn-outline-primary">View</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
