<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            min-height: 100vh;
        }
        .card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">

                <div class="text-center mb-4">
                    <div style="font-size:2rem">🔒</div>
                    <h5 class="fw-bold text-primary">Forgot Password</h5>
                    <p class="text-muted small"
                       th:text="${role == 'STUDENT'} ?
                       'Enter your USN to reset password' :
                       'Enter your Employee ID to reset password'">
                    </p>
                </div>

                <!-- Success Message -->
                <div th:if="${success}"
                     class="alert alert-success"
                     th:text="${success}">
                </div>

                <!-- Error Message -->
                <div th:if="${error}"
                     class="alert alert-danger"
                     th:text="${error}">
                </div>

                <!-- Step 1: Enter identifier -->
                <div th:if="${step == null or step == '1'}">
                    <form th:action="@{/forgot-password}" method="post">
                        <input type="hidden" name="role"
                               th:value="${role}">
                        <input type="hidden" name="step" value="1">

                        <div class="mb-3">
                            <label class="form-label fw-semibold"
                                   th:text="${role == 'STUDENT'} ?
                               'USN' : 'Employee ID'">
                            </label>
                            <input type="text" name="identifier"
                                   class="form-control"
                                   th:placeholder="${role == 'STUDENT'} ?
                                      'e.g. 4GW23CS098' :
                                      'e.g. EMP001'"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 py-2 fw-bold">
                            Verify Identity
                        </button>

                    </form>
                </div>

                <!-- Step 2: Reset Password -->
                <div th:if="${step == '2'}">
                    <form th:action="@{/forgot-password/reset}" method="post">
                        <input type="hidden" name="identifier"
                               th:value="${identifier}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                New Password
                            </label>
                            <input type="password" name="newPassword"
                                   id="newPassword"
                                   class="form-control"
                                   placeholder="Enter new password"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Confirm New Password
                            </label>
                            <input type="password" name="confirmPassword"
                                   id="confirmPassword"
                                   class="form-control"
                                   placeholder="Re-enter new password"
                                   required>
                            <div id="passwordError"
                                 class="text-danger small mt-1"
                                 style="display:none">
                                Passwords do not match!
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-success w-100 py-2 fw-bold"
                                onclick="return checkPasswords()">
                            Reset Password
                        </button>

                    </form>
                </div>

                <div class="text-center mt-3">
                    <a th:href="@{/login}"
                       class="text-decoration-none small text-muted">
                        ← Back to Login
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function checkPasswords() {
        const p1 = document.getElementById('newPassword').value;
        const p2 = document.getElementById('confirmPassword').value;
        if (p1 !== p2) {
            document.getElementById('passwordError').style.display = 'block';
            return false;
        }
        return true;
    }
</script>
</body>
</html>
