<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .role-btn {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .role-btn:hover { transform: scale(1.05); }
        .system-title {
            color: #1a237e;
            font-weight: 700;
            font-size: 1.4rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card p-4">

                <div class="text-center mb-4">
                    <div style="font-size:2.5rem">🎓</div>
                    <h4 class="system-title">Leave Management System</h4>
                    <p class="text-muted small mb-0">Select your role to continue</p>
                </div>

                <div th:if="${param.error}"
                     class="alert alert-danger text-center py-2">
                    Invalid credentials. Please try again.
                </div>
                <div th:if="${param.logout}"
                     class="alert alert-success text-center py-2">
                    Logged out successfully.
                </div>
                <div th:if="${success}"
                     class="alert alert-success text-center py-2"
                     th:text="${success}">
                </div>

                <!-- Role Selector -->
                <div class="row g-2 mb-4" id="roleSelector">
                    <div class="col-4">
                        <button type="button"
                                class="btn btn-outline-primary role-btn w-100"
                                onclick="selectRole('STUDENT')">
                            👨‍🎓<br>Student
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button"
                                class="btn btn-outline-success role-btn w-100"
                                onclick="selectRole('COUNSELLOR')">
                            👨‍🏫<br>Counsellor
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button"
                                class="btn btn-outline-danger role-btn w-100"
                                onclick="selectRole('ADMIN')">
                            🛡️<br>Admin
                        </button>
                    </div>
                </div>

                <!-- Login Form -->
                <form th:action="@{/login}" method="post"
                      id="loginForm" style="display:none">

                    <div class="text-center mb-3">
            <span id="roleLabel"
                  class="badge fs-6 px-3 py-2"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold"
                               id="identifierLabel">ID</label>
                        <input type="text"
                               name="identifier"
                               id="identifierInput"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter your password"
                               required>
                    </div>

                    <!-- Forgot Password -->
                    <div class="text-end mb-3">
                        <a href="#" id="forgotPasswordLink"
                           class="text-decoration-none small">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit"
                            id="loginBtn"
                            class="btn w-100 py-2 fw-bold">
                        Login
                    </button>

                    <!-- Register link for Student only -->
                    <div id="registerLink"
                         class="text-center mt-3" style="display:none">
                        <span class="text-muted small">New student? </span>
                        <a th:href="@{/register}"
                           class="text-decoration-none small fw-semibold">
                            Register here
                        </a>
                    </div>

                    <button type="button"
                            class="btn btn-link w-100 mt-2 text-muted small"
                            onclick="resetRole()">
                        ← Choose different role
                    </button>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentRole = '';

    function selectRole(role) {
        currentRole = role;
        document.getElementById('roleSelector').style.display = 'none';
        document.getElementById('loginForm').style.display   = 'block';

        const label        = document.getElementById('identifierLabel');
        const input        = document.getElementById('identifierInput');
        const btn          = document.getElementById('loginBtn');
        const roleLabel    = document.getElementById('roleLabel');
        const registerLink = document.getElementById('registerLink');
        const forgotLink   = document.getElementById('forgotPasswordLink');

        input.value = '';

        if (role === 'STUDENT') {
            label.textContent      = 'USN';
            input.placeholder      = 'e.g. 4GW23CS098';
            btn.className          = 'btn btn-primary w-100 py-2 fw-bold';
            roleLabel.textContent  = '👨‍🎓 Student Login';
            roleLabel.className    = 'badge bg-primary fs-6 px-3 py-2';
            registerLink.style.display = 'block';
            forgotLink.href        = '/forgot-password?role=STUDENT';

        } else if (role === 'COUNSELLOR') {
            label.textContent      = 'Employee ID';
            input.placeholder      = 'e.g. EMP001';
            btn.className          = 'btn btn-success w-100 py-2 fw-bold';
            roleLabel.textContent  = '👨‍🏫 Counsellor Login';
            roleLabel.className    = 'badge bg-success fs-6 px-3 py-2';
            registerLink.style.display = 'none';
            forgotLink.href        = '/forgot-password?role=COUNSELLOR';

        } else if (role === 'ADMIN') {
            label.textContent      = 'Employee ID';
            input.placeholder      = 'e.g. ADMIN001';
            btn.className          = 'btn btn-danger w-100 py-2 fw-bold';
            roleLabel.textContent  = '🛡️ Admin Login';
            roleLabel.className    = 'badge bg-danger fs-6 px-3 py-2';
            registerLink.style.display = 'none';
            forgotLink.href        = '/forgot-password?role=ADMIN';
        }

        input.focus();
    }

    function resetRole() {
        currentRole = '';
        document.getElementById('roleSelector').style.display = 'flex';
        document.getElementById('loginForm').style.display   = 'none';
    }
</script>
</body>
</html>
