<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            min-height: 100vh;
        }
        .card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <div class="text-center mb-4">
                    <div style="font-size:2rem">👨‍🎓</div>
                    <h5 class="fw-bold text-primary">Student Registration</h5>
                    <p class="text-muted small mb-0">
                        Leave Management System
                    </p>
                </div>

                <div th:if="${error}"
                     class="alert alert-danger"
                     th:text="${error}">
                </div>

                <form th:action="@{/register}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="name"
                               class="form-control"
                               placeholder="Enter your full name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">USN</label>
                        <input type="text" name="usn"
                               class="form-control"
                               placeholder="e.g. 4GW23CS098"
                               style="text-transform:uppercase"
                               required>
                        <div class="form-text">
                            Your University Seat Number
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department</label>
                        <input type="text" name="department"
                               class="form-control"
                               placeholder="e.g. Computer Science">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Academic Year</label>
                        <select name="academicYear" class="form-select" required>
                            <option value="">-- Select Year --</option>
                            <option value="2021-22">2021-22</option>
                            <option value="2022-23">2022-23</option>
                            <option value="2023-24">2023-24</option>
                            <option value="2024-25">2024-25</option>
                            <option value="2025-26">2025-26</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password"
                               id="password"
                               class="form-control"
                               placeholder="Create a password"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Confirm Password
                        </label>
                        <input type="password" name="confirmPassword"
                               id="confirmPassword"
                               class="form-control"
                               placeholder="Re-enter your password"
                               required>
                        <div id="passwordError"
                             class="text-danger small mt-1"
                             style="display:none">
                            Passwords do not match!
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100 py-2 fw-bold"
                            onclick="return checkPasswords()">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3 mb-0 small">
                    Already registered?
                    <a th:href="@{/login}"
                       class="fw-semibold text-decoration-none">
                        Login here
                    </a>
                </p>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function checkPasswords() {
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('confirmPassword').value;
        if (p1 !== p2) {
            document.getElementById('passwordError').style.display = 'block';
            return false;
        }
        return true;
    }
</script>
</body>
</html>
