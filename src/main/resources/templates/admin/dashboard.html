<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

  <h4 class="fw-bold">Admin Dashboard 🛡️</h4>
  <p class="text-muted">
    Employee ID: <span th:text="${admin.employeeId}"></span>
  </p>

  <div th:if="${success}"
       class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close"
            data-bs-dismiss="alert"></button>
  </div>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-md-2">
      <div class="card text-white bg-primary shadow text-center p-3">
        <h2 class="fw-bold" th:text="${totalStudents}">0</h2>
        <p class="mb-0">👨‍🎓 Students</p>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card text-white bg-secondary shadow text-center p-3">
        <h2 class="fw-bold" th:text="${totalCounsellors}">0</h2>
        <p class="mb-0">👨‍🏫 Counsellors</p>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card text-white bg-warning shadow text-center p-3">
        <h2 class="fw-bold" th:text="${pendingCount}">0</h2>
        <p class="mb-0">⏳ Pending</p>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card text-white bg-success shadow text-center p-3">
        <h2 class="fw-bold" th:text="${approvedCount}">0</h2>
        <p class="mb-0">✅ Approved</p>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card text-white bg-danger shadow text-center p-3">
        <h2 class="fw-bold" th:text="${rejectedCount}">0</h2>
        <p class="mb-0">❌ Rejected</p>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <a th:href="@{/admin/students/add}"
         class="btn btn-primary w-100 py-3">
        ➕ Add Student
      </a>
    </div>
    <div class="col-md-3">
      <a th:href="@{/admin/counsellors/add}"
         class="btn btn-secondary w-100 py-3">
        ➕ Add Counsellor
      </a>
    </div>
    <div class="col-md-3">
      <form th:action="@{/admin/students/auto-assign}" method="post">
        <button type="submit" class="btn btn-info w-100 py-3 text-white"
                onclick="return confirm(
                    'Auto assign all students to counsellors by USN?')">
          🔄 Auto Assign
        </button>
      </form>
    </div>
    <div class="col-md-3">
      <a th:href="@{/admin/users}"
         class="btn btn-outline-dark w-100 py-3">
        👥 Manage Users
      </a>
    </div>
  </div>

  <!-- Recent Leaves -->
  <div class="card shadow">
    <div class="card-header bg-dark text-white fw-bold">
      📋 Recent Leave Requests
    </div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>USN</th>
          <th>Counsellor</th>
          <th>Leave Type</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="leave, i : ${recentLeaves}">
          <td th:text="${i.count}"></td>
          <td th:text="${leave.student.name}"></td>
          <td th:text="${leave.student.usn}"></td>
          <td th:text="${leave.student.counsellor != null ?
                             leave.student.counsellor.name : 'N/A'}">
          </td>
          <td th:text="${leave.leaveType.name}"></td>
          <td th:text="${leave.fromDate}"></td>
          <td th:text="${leave.toDate}"></td>
          <td>
                <span th:text="${leave.status}"
                      th:class="${leave.status.name() == 'APPROVED'} ?
                                 'badge bg-success' :
                                 (${leave.status.name() == 'REJECTED'} ?
                                  'badge bg-danger' :
                                  'badge bg-warning text-dark')">
                </span>
          </td>
          <td>
            <a th:href="@{/admin/leave/{id}(id=${leave.id})}"
               class="btn btn-sm btn-outline-primary">View</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
