<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white fw-bold">
                    ➕ Add New Student
                </div>
                <div class="card-body">

                    <div th:if="${error}"
                         class="alert alert-danger"
                         th:text="${error}"></div>

                    <form th:action="@{/admin/students/add}"
                          th:object="${student}" method="post">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" th:field="*{name}"
                                       class="form-control"
                                       placeholder="Student full name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">USN</label>
                                <input type="text" th:field="*{usn}"
                                       class="form-control"
                                       placeholder="e.g. 4GW23CS098"
                                       style="text-transform:uppercase"
                                       required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Department</label>
                                <input type="text" th:field="*{department}"
                                       class="form-control"
                                       placeholder="e.g. Computer Science">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Academic Year</label>
                                <input type="text" name="academicYear"
                                       class="form-control"
                                       placeholder="e.g. 2023-24" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Assign Counsellor
                            </label>
                            <select name="counsellorId" class="form-select" required>
                                <option value="">-- Select Counsellor --</option>
                                <option th:each="c : ${counsellors}"
                                        th:value="${c.id}"
                                        th:text="${c.name} + ' (' + ${c.employeeId} + ')'">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" th:field="*{password}"
                                   class="form-control"
                                   placeholder="Set initial password" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                Add Student
                            </button>
                            <a th:href="@{/admin/users}"
                               class="btn btn-outline-secondary">Cancel</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
