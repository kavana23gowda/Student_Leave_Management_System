<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Counsellor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-secondary text-white fw-bold">
          ➕ Add New Counsellor
        </div>
        <div class="card-body">

          <div th:if="${error}"
               class="alert alert-danger"
               th:text="${error}"></div>

          <form th:action="@{/admin/counsellors/add}"
                th:object="${counsellor}" method="post">

            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" th:field="*{name}"
                     class="form-control"
                     placeholder="Counsellor full name" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Employee ID</label>
              <input type="text" th:field="*{employeeId}"
                     class="form-control"
                     placeholder="e.g. EMP002" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" th:field="*{department}"
                     class="form-control"
                     placeholder="e.g. Computer Science">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" th:field="*{password}"
                     class="form-control"
                     placeholder="Set initial password" required>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-secondary px-4">
                Add Counsellor
              </button>
              <a th:href="@{/admin/users}"
                 class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
