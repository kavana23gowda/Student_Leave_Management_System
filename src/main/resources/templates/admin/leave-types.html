<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leave Types</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h5 class="fw-bold mb-3">📂 Manage Leave Types</h5>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <div class="row">

        <!-- Add Leave Type Form -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white fw-bold">
                    ➕ Add Leave Type
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/leave-types/add}"
                          th:object="${newLeaveType}" method="post">
                        <div class="mb-2">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}"
                                   class="form-control" required
                                   placeholder="e.g. Medical Leave">
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Description</label>
                            <input type="text" th:field="*{description}"
                                   class="form-control"
                                   placeholder="Short description">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Max Days</label>
                            <input type="number" th:field="*{maxDays}"
                                   class="form-control" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Add Leave Type
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Leave Types List -->
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Max Days</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="lt, i : ${leaveTypes}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${lt.name}"></td>
                            <td th:text="${lt.description}"></td>
                            <td th:text="${lt.maxDays}"></td>
                            <td>
                                <form th:action="@{/admin/leave-types/{id}/delete(id=${lt.id})}"
                                      method="post">
                                    <button class="btn btn-sm btn-danger"
                                            onclick="return confirm('Delete this leave type?')">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
