<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            🎓 Leave Management System
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Student Links -->
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/dashboard}">
                        🏠 Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/apply}">
                        📝 Apply Leave
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/profile}">
                        👤 Profile
                    </a>
                </li>

                <!-- Counsellor Links -->
                <li class="nav-item" sec:authorize="hasRole('COUNSELLOR')">
                    <a class="nav-link" th:href="@{/counsellor/dashboard}">
                        🏠 Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('COUNSELLOR')">
                    <a class="nav-link" th:href="@{/counsellor/students}">
                        👥 My Students
                    </a>
                </li>

                <!-- Admin Links -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        🏠 Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        👥 Manage Users
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/leave-types}">
                        📂 Leave Types
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/leaves}">
                        📋 All Leaves
                    </a>
                </li>

                <!-- Notification Bell -->
                <li class="nav-item me-2">
                    <a class="nav-link position-relative"
                       sec:authorize="hasRole('STUDENT')"
                       th:href="@{/student/notifications}">
                        🔔
                        <span class="badge bg-danger rounded-pill position-absolute
                         top-0 start-100 translate-middle"
                              th:if="${unreadCount > 0}"
                              th:text="${unreadCount}"></span>
                    </a>
                    <a class="nav-link position-relative"
                       sec:authorize="hasRole('COUNSELLOR')"
                       th:href="@{/counsellor/notifications}">
                        🔔
                        <span class="badge bg-danger rounded-pill position-absolute
                         top-0 start-100 translate-middle"
                              th:if="${unreadCount > 0}"
                              th:text="${unreadCount}"></span>
